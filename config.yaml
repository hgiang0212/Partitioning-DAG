name: YOLO
server:
  cut-layer: b
  clients:
    - 9
    - 2
  model: yolo26n
  batch-size: 5

rabbit:
  address: 127.0.0.1
  username: guest
  password: guest
  virtual-host: /

pdd:
  enabled: True
  inter_cloud_bandwidth_MBps: 125.0         # BW giữa các cloud node (1 Gbps LAN)
profile:
  devices_path: src/devices.json
  layer_profile_path: src/layer_profile.json
debug-mode: False
data: video.mp4
log-path: .
compress:
  enable: True
  num_bit: 8
