name: YOLO
server:
  cut-layer: b
  clients:
    - 3
    - 3
  model: yolo26n
  batch-size: 1

rabbit:
  address: 127.0.0.1
  username: guest
  password: guest
  virtual-host: /

pdd:
  enabled: True
  profiles_path: devices.json              # file chứa layer_times + bandwidth đã đo
  inter_cloud_bandwidth_MBps: 125.0         # BW giữa các cloud node (1 Gbps LAN)

debug-mode: False
data: video.mp4
log-path: .
compress:
  enable: True
  num_bit: 8
